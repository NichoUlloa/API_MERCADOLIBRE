name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
      - uses: actions/upload-pages-artifact@v1
        with:
          path: frontend/dist
      - uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
